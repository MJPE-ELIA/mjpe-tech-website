<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - MJPE Tech</title>

    <link rel="stylesheet" href="assets/css/style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo">MJPE Tech</div>

      <nav class="nav">
        <a href="index.html">Accueil</a>
        <a href="about.html">À propos</a>
        <a href="news.html">Nouveautés</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h1>Contactez MJPE Tech</h1>
      <p>Nous sommes ouverts aux collaborations, idées et opportunités.</p>
    </section>

    <!-- CONTACT FORM -->
    <section class="section">
      <form style="max-width: 600px; margin: auto; text-align: left">
        <label>Nom</label><br />
        <input
          type="text"
          placeholder="Votre nom"
          style="width: 100%; padding: 10px; margin: 10px 0"
        /><br />

        <label>Email</label><br />
        <input
          type="email"
          placeholder="Votre email"
          style="width: 100%; padding: 10px; margin: 10px 0"
        /><br />

        <label>Message</label><br />
        <textarea
          placeholder="Votre message"
          style="width: 100%; padding: 10px; margin: 10px 0; height: 120px"
        ></textarea
        ><br />

        <button class="btn primary" type="submit">Envoyer</button>
      </form>
    </section>

    <!-- INFO -->
    <section class="section values">
      <h2>Informations</h2>
      <p>Email : mjpetech@gmail.com (future)</p>
      <p>GitHub : MJPE-ELIA</p>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <p>© 2026 MJPE Tech</p>
    </footer>
  </body>
